# Render Infrastructure-as-Code
# https://render.com/docs/blueprint-spec
services:
  # Django Backend Web Service
  - type: web
    name: property237-backend
    runtime: python
    region: oregon
    plan: starter
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && ./start.sh"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "property237.onrender.com,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: property237-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: property237-redis
          type: redis
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SENTRY_ENVIRONMENT
        value: production
    healthCheckPath: /health/

  # Celery Worker (Background Tasks)
  - type: worker
    name: property237-worker
    runtime: python
    region: oregon
    plan: starter
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && celery -A config worker -l info --concurrency=2"
    envVars:
      - key: SECRET_KEY
        fromService:
          name: property237-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: property237-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: property237-redis
          type: redis
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings

  # Celery Beat (Periodic Tasks)
  - type: worker
    name: property237-beat
    runtime: python
    region: oregon
    plan: starter
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    envVars:
      - key: SECRET_KEY
        fromService:
          name: property237-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: property237-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: property237-redis
          type: redis
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings

  # Redis
  - type: redis
    name: property237-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: property237-db
    region: oregon
    plan: starter
    databaseName: property237
    postgresMajorVersion: 15
